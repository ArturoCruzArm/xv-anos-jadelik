<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selector de Fotos - Jadelik XV Años</title>
    <link rel="stylesheet" href="css/selector.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <h1 class="main-title">Selector de Fotos</h1>
            <h2 class="subtitle">XV Años de Jadelik</h2>
            <p class="instructions">Haz clic en cada foto para seleccionar qué quieres hacer con ella</p>
        </div>
    </header>

    <!-- Control Panel -->
    <section class="control-panel">
        <div class="container">
            <div class="stats-row">
                <div class="stat-card ampliacion">
                    <div class="stat-icon">🖼️</div>
                    <div class="stat-info">
                        <h3>Ampliación</h3>
                        <p class="stat-count" id="countAmpliacion">0</p>
                    </div>
                </div>
                <div class="stat-card impresion">
                    <div class="stat-icon">📸</div>
                    <div class="stat-info">
                        <h3>Impresión</h3>
                        <p class="stat-count" id="countImpresion">0</p>
                    </div>
                </div>
                <div class="stat-card invitacion">
                    <div class="stat-icon">💌</div>
                    <div class="stat-info">
                        <h3>Invitación</h3>
                        <p class="stat-count" id="countInvitacion">0</p>
                    </div>
                </div>
                <div class="stat-card descartada">
                    <div class="stat-icon">❌</div>
                    <div class="stat-info">
                        <h3>Descartadas</h3>
                        <p class="stat-count" id="countDescartada">0</p>
                    </div>
                </div>
                <div class="stat-card sin-clasificar">
                    <div class="stat-icon">⭕</div>
                    <div class="stat-info">
                        <h3>Sin Clasificar</h3>
                        <p class="stat-count" id="countSinClasificar">254</p>
                    </div>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-filter" id="btnFilterAll">Todas (254)</button>
                <button class="btn btn-filter filter-ampliacion" id="btnFilterAmpliacion">Ampliación (0)</button>
                <button class="btn btn-filter filter-impresion" id="btnFilterImpresion">Impresión (0)</button>
                <button class="btn btn-filter filter-invitacion" id="btnFilterInvitacion">Invitación (0)</button>
                <button class="btn btn-filter filter-descartada" id="btnFilterDescartada">Descartadas (0)</button>
                <button class="btn btn-filter filter-sin-clasificar" id="btnFilterSinClasificar">Sin Clasificar (254)</button>
            </div>

            <div class="action-buttons secondary">
                <button class="btn btn-export" id="btnExport">📥 Descargar Reporte</button>
                <button class="btn btn-share" id="btnShare">📤 Copiar Resumen</button>
                <button class="btn btn-clear" id="btnClear">🗑️ Limpiar Todo</button>
            </div>
        </div>
    </section>

    <!-- Gallery -->
    <section class="gallery-section">
        <div class="container">
            <div class="photos-grid" id="photosGrid"></div>
        </div>
    </section>

    <!-- Modal for Photo Selection -->
    <div id="photoModal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <div class="modal-body">
                <div class="modal-image-container">
                    <img id="modalImage" src="" alt="Foto seleccionada">
                    <div class="modal-photo-number" id="modalPhotoNumber"></div>
                </div>
                <div class="modal-options">
                    <h3>¿Qué quieres hacer con esta foto?</h3>
                    <p class="modal-subtitle">Puedes seleccionar una o varias opciones</p>

                    <div class="option-buttons">
                        <button class="option-btn ampliacion" data-category="ampliacion">
                            <span class="option-icon">🖼️</span>
                            <span class="option-text">Ampliación</span>
                            <span class="option-check">✓</span>
                        </button>
                        <button class="option-btn impresion" data-category="impresion">
                            <span class="option-icon">📸</span>
                            <span class="option-text">Impresión</span>
                            <span class="option-check">✓</span>
                        </button>
                        <button class="option-btn invitacion" data-category="invitacion">
                            <span class="option-icon">💌</span>
                            <span class="option-text">Invitación</span>
                            <span class="option-check">✓</span>
                        </button>
                        <button class="option-btn descartada" data-category="descartada">
                            <span class="option-icon">❌</span>
                            <span class="option-text">Descartar</span>
                            <span class="option-check">✓</span>
                        </button>
                    </div>

                    <div class="modal-actions">
                        <button class="btn btn-save" id="btnSaveSelection">Guardar</button>
                        <button class="btn btn-cancel" id="btnCancelSelection">Cancelar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="js/selector.js"></script>
    <script src="js/visitas.js?v=1"></script>
</body>
</html>
